name: ci
on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build-and-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Byte-compile (syntax gate)
        run: python -m compileall -q lib dashboard scripts
      - name: Import smoke (app boots without cloud, no secrets)
        env:
          TQ_DATA_DIR: ${{ runner.temp }}/data   # ephemeral; no real data/secrets in CI
        run: |
          python -c "import lib.config as c; c.ensure_dirs(); print('config OK', c.DATA_DIR)"
          python -c "from dashboard.server import app; print('FastAPI app import OK')"

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build engine image (no secrets/data baked in)
        run: docker build -t thetaquant-engine:ci .
