<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="color-scheme" content="light dark">
<title>Theta Quant — Sign in</title>
<style>
  :root{ --navy:#1b3f80; --blue:#2f64d4; --sky:#2f7fd4; --bg:#0f1420; --card:#171d2b;
    --text:#eef2fb; --muted:#9aa7c2; --border:#26304a; --err:#ef4444; }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ margin:0; height:100%; background:var(--bg); color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; }
  .wrap{ min-height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center;
    padding:28px 22px calc(28px + env(safe-area-inset-bottom)); text-align:center; }
  .logo{ width:72px; height:72px; border-radius:19px; margin-bottom:16px;
    background:linear-gradient(135deg,var(--navy),var(--blue) 55%,var(--sky));
    display:flex; align-items:center; justify-content:center; box-shadow:0 10px 30px rgba(47,100,212,.35); }
  .logo svg{ width:42px; height:42px; }
  h1{ font-size:21px; font-weight:800; margin:0 0 3px; letter-spacing:-.02em; }
  .sub{ color:var(--muted); font-size:13px; margin:0 0 24px; }
  form{ width:100%; max-width:360px; background:var(--card); border:1px solid var(--border);
    border-radius:16px; padding:18px 16px; text-align:left; }
  label{ display:block; font-size:11px; color:var(--muted); font-weight:600; text-transform:uppercase;
    letter-spacing:.04em; margin:12px 2px 6px; }
  label:first-child{ margin-top:0; }
  input{ width:100%; padding:12px 13px; font-size:16px; border-radius:10px; border:1px solid var(--border);
    background:#0e1422; color:var(--text); outline:none; }
  input:focus{ border-color:var(--blue); }
  button{ width:100%; margin-top:18px; padding:13px; font-size:15px; font-weight:700; border:0;
    border-radius:10px; color:#fff; background:linear-gradient(135deg,var(--blue),var(--navy)); cursor:pointer; }
  button:active{ opacity:.85; }
  .err{ color:var(--err); font-size:13px; margin:14px 2px 0; min-height:16px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="logo" aria-hidden="true">
    <svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
      <ellipse cx="32" cy="32" rx="12.5" ry="17.5" fill="none" stroke="#fff" stroke-width="4.5"/>
      <line x1="20.5" y1="32" x2="43.5" y2="32" stroke="#fff" stroke-width="4.5" stroke-linecap="round"/>
    </svg>
  </div>
  <h1>Theta Quant</h1>
  <p class="sub">Sign in to continue</p>
  <form method="post" action="/login">
    <input type="hidden" name="next" value="{{ next }}">
    <label for="u">Username</label>
    <input id="u" name="username" autocapitalize="off" autocorrect="off" autocomplete="username" spellcheck="false" autofocus>
    <label for="p">Password</label>
    <input id="p" name="password" type="password" autocomplete="current-password">
    <button type="submit">Sign in</button>
    {% if error %}<div class="err">{{ error }}</div>{% endif %}
  </form>
</div>
</body>
</html>
