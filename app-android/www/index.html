<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="color-scheme" content="light dark">
<title>Theta Quant</title>
<style>
  :root{ --navy:#1b3f80; --blue:#2f64d4; --sky:#2f7fd4; --bg:#0f1420; --card:#171d2b; --text:#eef2fb; --muted:#9aa7c2; --border:#26304a; --ok:#16a34a; --err:#ef4444; }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ margin:0; height:100%; background:var(--bg); color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; }
  .wrap{ min-height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center;
    padding:28px 22px calc(28px + env(safe-area-inset-bottom)); text-align:center; }
  .logo{ width:76px; height:76px; border-radius:20px; margin-bottom:18px;
    background:linear-gradient(135deg,var(--navy),var(--blue) 55%,var(--sky));
    display:flex; align-items:center; justify-content:center; box-shadow:0 10px 30px rgba(47,100,212,.35); }
  .logo svg{ width:44px; height:44px; }
  h1{ font-size:22px; font-weight:800; margin:0 0 4px; letter-spacing:-.02em; }
  .sub{ color:var(--muted); font-size:13px; margin:0 0 26px; }
  .card{ width:100%; max-width:380px; background:var(--card); border:1px solid var(--border);
    border-radius:16px; padding:18px 16px; }
  label{ display:block; text-align:left; font-size:11px; color:var(--muted); font-weight:600;
    text-transform:uppercase; letter-spacing:.04em; margin:0 2px 6px; }
  input{ width:100%; padding:12px 13px; font-size:15px; border-radius:10px; border:1px solid var(--border);
    background:#0e1422; color:var(--text); outline:none; }
  input:focus{ border-color:var(--blue); }
  button{ width:100%; margin-top:14px; padding:13px; font-size:15px; font-weight:700; border:0;
    border-radius:10px; color:#fff; background:linear-gradient(135deg,var(--blue),var(--navy));
    cursor:pointer; }
  button:active{ opacity:.85; }
  button:disabled{ opacity:.55; }
  .status{ margin-top:16px; font-size:13px; min-height:18px; }
  .status.ok{ color:var(--ok); } .status.err{ color:var(--err); } .status.busy{ color:var(--muted); }
  .spin{ display:inline-block; width:14px; height:14px; border:2px solid var(--muted); border-top-color:transparent;
    border-radius:50%; animation:s .7s linear infinite; vertical-align:-2px; margin-right:6px; }
  @keyframes s{ to{ transform:rotate(360deg);} }
  .hint{ color:var(--muted); font-size:11.5px; margin-top:22px; line-height:1.55; max-width:340px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="logo" aria-hidden="true">
    <svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
      <ellipse cx="32" cy="32" rx="12.5" ry="17.5" fill="none" stroke="#fff" stroke-width="4.5"/>
      <line x1="20.5" y1="32" x2="43.5" y2="32" stroke="#fff" stroke-width="4.5" stroke-linecap="round"/>
    </svg>
  </div>
  <h1>Theta Quant</h1>
  <p class="sub">Connect to your desk</p>

  <div class="card">
    <label for="url">Server address</label>
    <input id="url" type="url" inputmode="url" autocapitalize="off" autocorrect="off" spellcheck="false"
           placeholder="https://theta.yourdomain.com">
    <button id="go">Connect</button>
    <div id="status" class="status"></div>
  </div>

  <p class="hint">Enter the address of your Theta Quant server (the Cloudflare tunnel URL from the Mac mini).
     It's remembered after the first time. The Mac must be on and the tunnel running.</p>
</div>

<script>
(function(){
  var KEY = 'thetadesk_server_url';
  var urlEl = document.getElementById('url');
  var goEl  = document.getElementById('go');
  var stEl  = document.getElementById('status');

  // Prefill: saved value, else a build-time default (edit if you bake one in).
  var DEFAULT_URL = ''; // e.g. 'https://theta.yourdomain.com'
  var saved = '';
  try { saved = localStorage.getItem(KEY) || ''; } catch(e){}
  urlEl.value = saved || DEFAULT_URL;

  function normalise(u){
    u = (u||'').trim();
    if(!u) return '';
    if(!/^https?:\/\//i.test(u)) u = 'https://' + u;   // default to https
    return u.replace(/\/+$/,'');                        // drop trailing slash
  }
  function setStatus(cls, html){ stEl.className = 'status ' + (cls||''); stEl.innerHTML = html || ''; }

  function connect(){
    var u = normalise(urlEl.value);
    if(!u){ setStatus('err','Enter your server address.'); return; }
    urlEl.value = u;
    goEl.disabled = true;
    setStatus('busy','<span class="spin"></span>Checking the Mac…');

    // Health-check with a timeout so a dead server fails fast instead of hanging.
    var ctrl = new AbortController();
    var to = setTimeout(function(){ ctrl.abort(); }, 8000);
    fetch(u + '/api/health', { signal: ctrl.signal, credentials: 'include', cache: 'no-store' })
      .then(function(r){
        clearTimeout(to);
        // Any HTTP response (even 401 login-required) means the server is REACHABLE.
        try { localStorage.setItem(KEY, u); } catch(e){}
        setStatus('ok','Connected — opening…');
        setTimeout(function(){ window.location.replace(u + '/'); }, 250);
      })
      .catch(function(err){
        clearTimeout(to);
        goEl.disabled = false;
        setStatus('err', "Can't reach the server. Is the Mac on and the tunnel running? Check the address.");
      });
  }

  goEl.addEventListener('click', connect);
  urlEl.addEventListener('keydown', function(e){ if(e.key === 'Enter') connect(); });

  // Auto-connect if we already know the address (skip the form on repeat launches).
  if(saved){ connect(); }
})();
</script>
</body>
</html>
